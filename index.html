<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga / Book Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .manga-section {
      margin-bottom: 40px;
    }

    .manga-title {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-title {
      text-align: center;
      padding: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>📚 Manga / Book Library</h1>

  <div id="library"></div>

  <script>
    const mangaData = [
      {
        title: "One Punch Man",
        volumes: [
          { name: "Volume 1", cover: "covers/opm_vol1.png" },
          { name: "Volume 2", cover: "covers/opm_vol2.jpg" },
          { name: "Volume 3", cover: "covers/opm_vol3.jpg" },
          { name: "Volume 4", cover: "covers/opm_vol4.jpg" },
          { name: "Volume 5", cover: "covers/opm_vol5.jpg" },
          { name: "Volume 6", cover: "covers/opm_vol6.jpg" },
          { name: "Volume 7", cover: "covers/opm_vol7.jpg" },
          { name: "Volume 8", cover: "covers/opm_vol8.jpg" },
          { name: "Volume 9", cover: "covers/opm_vol9.jpg" },
          { name: "Volume 10", cover: "covers/opm_vol10.jpg" },
          { name: "Volume 11", cover: "covers/opm_vol11.jpg" },
          { name: "Volume 12", cover: "covers/opm_vol12.jpg" },
          { name: "Volume 13", cover: "covers/opm_vol13.jpg" },
          { name: "Volume 14", cover: "covers/opm_vol14.jpg" },
          { name: "Volume 15", cover: "covers/opm_vol15.jpg" },
          { name: "Volume 16", cover: "covers/opm_vol16.jpg" },
          { name: "Volume 17", cover: "covers/opm_vol17.jpg" },
          { name: "Volume 18", cover: "covers/opm_vol18.jpg" },
          { name: "Volume 19", cover: "covers/opm_vol19.jpg" },
          { name: "Volume 20", cover: "covers/opm_vol20.jpg" },
          { name: "Volume 21", cover: "covers/opm_vol21.jpg" },

          { name: "Volume 23", cover: "covers/opm_vol23.jpg" },
          { name: "Volume 24", cover: "covers/opm_vol24.jpg" },
          { name: "Volume 25", cover: "covers/opm_vol25.jpg" },
          { name: "Volume 26", cover: "covers/opm_vol26.jpg" },
          { name: "Volume 27", cover: "covers/opm_vol27.jpg" },
          { name: "Volume 28", cover: "covers/opm_vol28.jpg" },

      {
        title: "Shangri La Frontier",
        volumes: [

          { name: "Volume 2", cover: "covers/slf_vol2.png" },

          { name: "Volume 17", cover: "covers/slf_vol17.png" },
          { name: "Volume 18", cover: "covers/slf_vol18.png" },
          { name: "Volume 19", cover: "covers/slf_vol19.png" },
          { name: "Volume 20", cover: "covers/slf_vol20.png" },
          { name: "Volume 21", cover: "covers/slf_vol21.png" }
        ]
      }
    ];

    const libraryDiv = document.getElementById("library");

    mangaData.forEach(manga => {
      const section = document.createElement("div");
      section.className = "manga-section";

      const title = document.createElement("div");
      title.className = "manga-title";
      title.textContent = manga.title;

      const grid = document.createElement("div");
      grid.className = "grid";

      manga.volumes.forEach(volume => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = volume.cover;
        img.alt = volume.name;

        const name = document.createElement("div");
        name.className = "card-title";
        name.textContent = volume.name;

        card.appendChild(img);
        card.appendChild(name);
        grid.appendChild(card);
      });

      section.appendChild(title);
      section.appendChild(grid);
      libraryDiv.appendChild(section);
    });
  </script>

</body>
</html>

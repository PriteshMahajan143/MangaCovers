<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga / Book Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-weight: 600;
      font-size: 32px;
    }

    .search-box {
      margin-top: 15px;
    }

    .search-box input {
      padding: 10px 15px;
      width: 250px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .container {
      padding: 20px;
    }

    .manga-section {
      margin-bottom: 50px;
    }

    .manga-title {
      font-size: 26px;
      margin-bottom: 15px;
      font-weight: 600;
      border-left: 5px solid #00c6ff;
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .card-title {
      text-align: center;
      padding: 10px;
      font-weight: 500;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 24px; }
      .grid { gap: 15px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 Manga / Book Library</h1>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search manga...">
    </div>
  </header>

  <div class="container" id="library"></div>

  <script>
    const mangaData = [
      {
        title: "One Punch Man",
        volumes: Array.from({ length: 31 }, (_, i) => ({
          name: `Volume ${i + 1}`,
          cover: `covers/opm/Volume ${i + 1}.png`
        }))
      },
      {
        title: "Shangri La Frontier",
        volumes: Array.from({ length: 21 }, (_, i) => ({
          name: `Volume ${i + 1}`,
          cover: `covers/slf/Volume ${i + 1}.png`
        }))
      }
    ];

    const libraryDiv = document.getElementById("library");
    const searchInput = document.getElementById("search");

    function renderLibrary(filter = "") {
      libraryDiv.innerHTML = "";

      mangaData
        .filter(manga => manga.title.toLowerCase().includes(filter.toLowerCase()))
        .forEach(manga => {
          const section = document.createElement("div");
          section.className = "manga-section";

          const title = document.createElement("div");
          title.className = "manga-title";
          title.textContent = manga.title;

          const grid = document.createElement("div");
          grid.className = "grid";

          manga.volumes.forEach(volume => {
            const card = document.createElement("div");
            card.className = "card";

            const img = document.createElement("img");
            img.src = volume.cover;
            img.alt = volume.name;

            const name = document.createElement("div");
            name.className = "card-title";
            name.textContent = volume.name;

            card.appendChild(img);
            card.appendChild(name);
            grid.appendChild(card);
          });

          section.appendChild(title);
          section.appendChild(grid);
          libraryDiv.appendChild(section);
        });
    }

    searchInput.addEventListener("input", (e) => {
      renderLibrary(e.target.value);
    });

    renderLibrary();
  </script>

</body>
</html>

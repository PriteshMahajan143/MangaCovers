<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga / Book Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .manga-section {
      margin-bottom: 40px;
    }

    .manga-title {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-title {
      text-align: center;
      padding: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>📚 Manga / Book Library</h1>

  <div id="library"></div>

  <script>
    const mangaData = [
      {
        title: "One Punch Man",
        volumes: [
          { name: "Volume 1", cover: "covers/opm/Volume 1.png" },
          { name: "Volume 2", cover: "covers/opm/Volume 2.png" },
          { name: "Volume 3", cover: "covers/opm/Volume 3.png" },
          { name: "Volume 4", cover: "covers/opm/Volume 4.png" },
          { name: "Volume 5", cover: "covers/opm/Volume 5.png" },
          { name: "Volume 6", cover: "covers/opm/Volume 6.png" },
          { name: "Volume 7", cover: "covers/opm/Volume 7.png" },
          { name: "Volume 8", cover: "covers/opm/Volume 8.png" },
          { name: "Volume 9", cover: "covers/opm/Volume 9.png" },
          { name: "Volume 10", cover: "covers/opm/Volume 10.png" },
          { name: "Volume 11", cover: "covers/opm/Volume 11.png" },
          { name: "Volume 12", cover: "covers/opm/Volume 12.png" },
          { name: "Volume 13", cover: "covers/opm/Volume 13.png" },
          { name: "Volume 14", cover: "covers/opm/Volume 14.png" },
          { name: "Volume 15", cover: "covers/opm/Volume 15.png" },
          { name: "Volume 16", cover: "covers/opm/Volume 16.png" },
          { name: "Volume 17", cover: "covers/opm/Volume 17.png" },
          { name: "Volume 18", cover: "covers/opm/Volume 18.png" },
          { name: "Volume 19", cover: "covers/opm/Volume 19.png" },
          { name: "Volume 20", cover: "covers/opm/Volume 20.png" },
          { name: "Volume 21", cover: "covers/opm/Volume 21.png" },
          { name: "Volume 22", cover: "covers/opm/Volume 22.png" },
          { name: "Volume 23", cover: "covers/opm/Volume 23.png" },
          { name: "Volume 24", cover: "covers/opm/Volume 24.png" },
          { name: "Volume 25", cover: "covers/opm/Volume 25.png" },
          { name: "Volume 26", cover: "covers/opm/Volume 26.png" },
          { name: "Volume 27", cover: "covers/opm/Volume 27.png" },
          { name: "Volume 28", cover: "covers/opm/Volume 28.png" },

      {

          { name: "Volume 17", cover: "covers/slf/Volume 17.png" },
          { name: "Volume 18", cover: "covers/slf/Volume 18.png" },
          { name: "Volume 19", cover: "covers/slf/Volume 19.png" },
          { name: "Volume 20", cover: "covers/slf/Volume 20.png" },
          { name: "Volume 21", cover: "covers/slf/Volume 21.png" }
        ]
      }
    ];

    const libraryDiv = document.getElementById("library");

    mangaData.forEach(manga => {
      const section = document.createElement("div");
      section.className = "manga-section";

      const title = document.createElement("div");
      title.className = "manga-title";
      title.textContent = manga.title;

      const grid = document.createElement("div");
      grid.className = "grid";

      manga.volumes.forEach(volume => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = volume.cover;
        img.alt = volume.name;

        const name = document.createElement("div");
        name.className = "card-title";
        name.textContent = volume.name;

        card.appendChild(img);
        card.appendChild(name);
        grid.appendChild(card);
      });

      section.appendChild(title);
      section.appendChild(grid);
      libraryDiv.appendChild(section);
    });
  </script>

</body>
</html>
